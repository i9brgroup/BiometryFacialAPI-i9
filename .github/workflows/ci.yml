name: CI
run-name: Integration Tests
on:
    push:
        branches:
            - main
            - stag
    pull_request:
        branches:
            - main
            - stag
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Testes unitarios
        run: mvn clean test
